/* ── Schedule auto-updates based on current IST time ── */
/* Lock times are computed at load and refreshed every 60s.
   Actual save enforcement uses serverTimestamp() in Firebase Security Rules.
   Client lock is a UX hint; the real gate is server-side. */
function getMatchStatus(dateStr, timeStr) {
  const months={"Mar":2,"Apr":3};
  const parts=dateStr.split(" ");
  const day=parseInt(parts[0]);
  const month=months[parts[1]]||3;
  const timeParts=timeStr.replace(" PM","").replace(" AM","").split(":");
  let hour=parseInt(timeParts[0]);
  const min=parseInt(timeParts[1])||0;
  const isPM=timeStr.includes("PM");
  if(isPM&&hour!==12)hour+=12;
  /* IST = UTC+5:30 */
  const matchIST=new Date(Date.UTC(2026,month,day,hour-5,min-30,0));
  const matchEndIST=new Date(matchIST.getTime()+4*60*60*1000);
  const now=new Date();
  if(now>matchEndIST)return"past";
  if(now>=matchIST&&now<=matchEndIST)return"live";
  const diff=matchIST-now;
  const diffH=Math.floor(diff/3600000);
  const diffM=Math.floor((diff%3600000)/60000);
  const diffD=Math.floor(diffH/24);
  let lockStr="";
  if(diffD>0)lockStr=diffD+"d "+( diffH%24)+"h";
  else if(diffH>0)lockStr=diffH+"h "+diffM+"m";
  else lockStr=diffM+"m";
  const nowIST=new Date(now.getTime()+5.5*60*60*1000);
  const matchISTLocal=new Date(matchIST.getTime()+5.5*60*60*1000);
  const sameDay=nowIST.getUTCFullYear()===matchISTLocal.getUTCFullYear()&&
    nowIST.getUTCMonth()===matchISTLocal.getUTCMonth()&&
    nowIST.getUTCDate()===matchISTLocal.getUTCDate();
  return{status:sameDay?"next":"future",lock:lockStr};
}

/* Parse match time to UTC for lock enforcement */
function getMatchUTC(dateStr, timeStr){
  const months={"Mar":2,"Apr":3};
  const parts=dateStr.split(" ");
  const day=parseInt(parts[0]);
  const month=months[parts[1]]||3;
  const timeParts=timeStr.replace(" PM","").replace(" AM","").split(":");
  let hour=parseInt(timeParts[0]);
  const min=parseInt(timeParts[1])||0;
  if(timeStr.includes("PM")&&hour!==12)hour+=12;
  return new Date(Date.UTC(2026,month,day,hour-5,min-30,0));
}

/* Check if a match is locked (started or past) */
function isMatchLocked(m){
  if(m.status==="past"||m.status==="live")return true;
  return new Date()>=getMatchUTC(m.date,m.time);
}

function toast(msg,ok=true){

  el.textContent=msg;
  el.style.background=ok?"#14532d":"#450a0a";
  el.style.color=ok?"#86efac":"#fca5a5";

function R(){
  const app=document.getElementById("app");if(!app)return;
  /* Save all scroll positions and focus before re-render */
  const focused=document.activeElement;
  const focusId=focused?.id||"";
  const focusSel=focused?.selectionStart;
  const mainEl=document.getElementById("main");
  const mainScroll=mainEl?mainEl.scrollTop:0;
  const plEl=document.getElementById("player-list");
  const plScroll=plEl?plEl.scrollTop:0;

  if(A.screen==="ob"){app.innerHTML=OB();return;}
  if(!A.fbUser){app.innerHTML=AuthScreen();_restoreFocus(focusId,focusSel);return;}
  const av=A.avatar?`<img src="${A.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`
    :`<span style="font-size:10px;font-weight:800">${(A.profile?.name||"?").substring(0,2).toUpperCase()}</span>`;
  app.innerHTML=`
    ${A.liveSc?MScore():""}${A.liveCt?MCentre():""}${A.showSh?ShareSh():""}${A.showPre?PreMatch():""}
    <div class="hdr">
      <div style="display:flex;align-items:center;gap:8px">
        ${A.screen==="play"?`<button onclick="back()" style="background:transparent;border:none;color:#6366f1;font-size:16px;cursor:pointer;padding:0;line-height:1">&#8592;</button>`:""}
        <div class="logo"><div class="logo-dot"></div>dotball</div>
      </div>
      <div style="display:flex;align-items:center;gap:9px">
        <div class="live-pill"><span class="blink">&#9679;</span> Live</div>
        <div class="av" onclick="nav('profile')">${av}</div>
      </div>
    </div>
    <div class="content" id="main">${Page()}</div>
    ${A.screen!=="play"?NavBar():""}`;
  /* Restore all scroll positions */
  const nm=document.getElementById("main");
  if(nm)nm.scrollTop=mainScroll;
  const np=document.getElementById("player-list");
  if(np)np.scrollTop=plScroll;
  _restoreFocus(focusId,focusSel);
}
function _restoreFocus(id,sel){
  if(!id)return;
  requestAnimationFrame(()=>{
    const el=document.getElementById(id);
    if(el){el.focus();if(typeof sel==="number"&&el.setSelectionRange){try{el.setSelectionRange(sel,sel);}catch(e){}}}
  });
}

async function doEmailSignup(){
  const nameInp=document.getElementById("auth-name");
  const emailInp=document.getElementById("auth-email");
  const passInp=document.getElementById("auth-pass");
  const n=(nameInp?nameInp.value:A.authName||"").trim();
  const e=(emailInp?emailInp.value:A.authEmail||"").trim();
  const p=passInp?passInp.value:A.authPass||"";
  A.authName=n;A.authEmail=e;A.authPass=p;
  if(n.length<2){A.authError="Display name must be at least 2 characters";R();return;}
  if(!e||!e.includes("@")){A.authError="Please enter a valid email address";R();return;}
  if(p.length<6){A.authError="Password must be at least 6 characters";R();return;}
  A.authError="";A.authLoading=true;A.authBusy=true;R();
  try{
    const cred=await createUserWithEmailAndPassword(auth,e,p);
    await updateProfile(cred.user,{displayName:n});

async function doEmailLogin(){
  const emailInp=document.getElementById("auth-email");

  const e=(emailInp?emailInp.value:A.authEmail||"").trim();
  const p=passInp?passInp.value:A.authPass||"";
  A.authEmail=e;A.authPass=p;
  if(!e||!e.includes("@")){A.authError="Please enter a valid email address";R();return;}
  if(p.length<1){A.authError="Please enter your password";R();return;}
  A.authError="";A.authLoading=true;A.authBusy=true;R();
  try{

    A.authLoading=false;A.authBusy=false;A.authPass="";A.screen="home";R();
    toast("Welcome back, "+n+"! &#127951;");
    loadChallenges();
  }catch(err){A.authLoading=false;A.authBusy=false;A.authError=_authErr(err.code);R();}
}

async function doResetPw(){
  const emailInp=document.getElementById("auth-email");
  const e=(emailInp?emailInp.value:A.authEmail||"").trim();
  if(!e||!e.includes("@")){A.authError="Please enter your email address";R();return;}

    <button onclick="lockXI()" ${A.C&&A.VC&&A.IP1&&A.IP2?"":"disabled"} style="width:100%;padding:13px;border-radius:12px;border:none;font-weight:700;font-size:13px;cursor:${A.C&&A.VC&&A.IP1&&A.IP2?"pointer":"not-allowed"};background:${A.C&&A.VC&&A.IP1&&A.IP2?"#6366f1":"#1e293b"};color:${A.C&&A.VC&&A.IP1&&A.IP2?"#fff":"#475569"};margin-top:4px">

  return`<div style="padding:12px 12px 0">

    </div>`:""}
    <div class="card" style="padding:9px 12px;margin-bottom:8px">

      </div>
      <div style="height:5px;border-radius:99px;background:#1c2035;overflow:hidden"><div style="height:5px;border-radius:99px;width:${Math.min(100,spent)}%;transition:width .3s;background:${rem<10?"linear-gradient(90deg,#ef4444,#f97316)":"linear-gradient(90deg,#6366f1,#06b6d4)"}"></div></div>

    ${A.sel.length===0?`<button onclick="autoPick()" style="width:100%;padding:10px;border-radius:10px;border:1.5px solid #f59e0b44;background:#f59e0b08;color:#f5a623;font-weight:700;font-size:12px;cursor:pointer;margin-bottom:8px">&#9889; Auto Pick XI (based on recent form)</button>`:``}
    ${A.sel.length?`<div style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px">${A.sel.map(p=>`<div onclick="remP('${p.id}')" style="display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:7px;font-size:10px;font-weight:600;margin:2px;cursor:pointer;background:${T[p.team].bg}22;border:1px solid ${T[p.team].bg}55;color:${T[p.team].bg}">${p.n.split(" ")[0]} <span style="opacity:.6">&times;</span></div>`).join("")}</div>`:""}

      ${["ALL",m.t1,m.t2].map(v=>`<button onclick="A.xiF='${v}';R()" style="flex:1;padding:5px 3px;border-radius:9px;border:none;cursor:pointer;font-size:10px;font-weight:600;background:${A.xiF===v?"#6366f1":"#0d0f1a"};color:${A.xiF===v?"#fff":"#7a85a0"}">${v}</button>`).join("")}

      ${A.sel.length<11?`Pick ${11-A.sel.length} more`:"Assign roles"}

  </div>`;
}

/* ══ R3 ══ */

  const flt=all.filter(p=>(A.r3F==="ALL"||p.team===A.r3F)&&(!A.r3Q||p.n.toLowerCase().includes(A.r3Q.toLowerCase())));
  if(A.done3){
    const existingCh=A.challenges.length?A.challenges[0]:null;
    return`<div style="padding:12px 12px 0;text-align:center">

    ${A.squad3.map((p,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:13px;margin-bottom:8px;background:#111421;border:2px solid ${T[p.team].bg}66;text-align:left">

      ${Logo(p.team,34)}<div style="flex:1"><div style="font-size:12px;font-weight:700;color:#eef0ff">${p.n}</div>
      <span style="font-size:8px;padding:1px 5px;border-radius:99px;background:${RC[p.r]}18;color:${RC[p.r]};border:1px solid ${RC[p.r]}30">${p.r}</span></div>
      <div style="font-size:12px;font-weight:700;color:#06b6d4">${(CR[p.id]||7).toFixed(1)} cr</div>
    </div>`).join("")}
    ${existingCh?`<div class="card" style="padding:13px;margin-bottom:14px;text-align:left">
      <div style="font-size:10px;font-weight:600;color:#7a85a0;margin-bottom:6px">Share your challenge</div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <div style="font-size:22px;font-weight:900;letter-spacing:5px;font-family:Georgia,serif;color:#f5a623">${existingCh.code}</div>
      </div>
      <button onclick="A.shCode={w:'${existingCh.code}'};A.showSh=true;A.shDef=false;A.copied=false;R()" style="width:100%;padding:10px;border-radius:10px;border:none;background:#06b6d4;color:#fff;font-weight:700;font-size:12px;cursor:pointer">Share challenge code</button>
    </div>`
    :`<div class="card" style="padding:13px;margin-bottom:14px;text-align:center">
      <div style="font-size:11px;color:#7a85a0;margin-bottom:8px">Create a challenge to compete with friends</div>
      <button onclick="nav('groups')" style="padding:10px 20px;border-radius:10px;border:none;background:#06b6d4;color:#fff;font-weight:700;font-size:12px;cursor:pointer">Go to Groups</button>
    </div>`}
    <div style="display:flex;gap:8px;padding-bottom:12px">
      <button onclick="A.done3=false;A.squad3=[];R()" style="flex:1;padding:11px;border-radius:11px;border:1px solid #1c2035;background:transparent;color:#7a85a0;cursor:pointer;font-size:12px">Edit</button>
      <button id="sav-r3" onclick="savR3()" style="flex:1;padding:11px;border-radius:11px;border:1px solid #1c2035;background:transparent;color:#7a85a0;cursor:pointer;font-size:12px">Save this squad</button>
    </div>
  </div>`;}
  return`<div style="padding:12px 12px 0">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <button onclick="back()" style="background:transparent;border:none;color:#6366f1;font-size:11px;cursor:pointer;padding:0">&#8592; Matches</button>
      <div style="display:flex;gap:5px;align-items:center">${Logo(m.t1,16)}<span style="font-size:10px;font-weight:700;color:#eef0ff">${m.t1}</span><span style="color:#424960;font-size:9px">vs</span><span style="font-size:10px;font-weight:700;color:#eef0ff">${m.t2}</span>${Logo(m.t2,16)}</div>

}

/* ══ LEADERBOARD ══ */
function LB(){
  const tab=A.lbTab;
  const rows=A.lbRows;
  const season=A.lbSeason;
  return`<div style="padding:12px 12px 0">

      <button onclick="A.lbTab='r3';R()" style="flex:1;padding:9px;border-radius:9px;border:none;cursor:pointer;font-size:11px;font-weight:700;background:${tab==="r3"?"#06b6d4":"transparent"};color:${tab==="r3"?"#fff":"#7a85a0"}">Top 3</button>
      <button onclick="A.lbTab='season';R()" style="flex:1;padding:9px;border-radius:9px;border:none;cursor:pointer;font-size:11px;font-weight:700;background:${tab==="season"?"#f59e0b":"transparent"};color:${tab==="season"?"#000":"#7a85a0"}">Season</button>
    </div>
    <div class="card" style="padding:9px 11px;margin-bottom:12px;font-size:10px;color:#7a85a0;line-height:1.7">
      ${tab==="xi"?`<span style="color:#818cf8;font-weight:600">Classic XI &mdash; </span>Points from batting, bowling, fielding, economy &amp; strike rate.`
      :tab==="r3"?`<span style="color:#06b6d4;font-weight:600">Top 3 &mdash; </span>Total runs from your 3 predicted run scorers. 1 run = 1 point.`
      :`<span style="color:#f5a623;font-weight:600">Season &mdash; </span>Cumulative Classic XI points across all 74 matches of IPL 2026.`}
    </div>
    ${(tab==="season"?season:rows).length===0?`<div class="card" style="padding:28px 16px;text-align:center;margin-bottom:14px">
      <div style="font-size:32px;margin-bottom:8px">&#127942;</div>

    </div>`
    :tab==="season"?season.map((u,i)=>`<div style="display:flex;align-items:center;gap:9px;padding:11px 12px;border-radius:13px;margin-bottom:7px;background:${u.isMe?"#1a1400":"#111421"};border:${u.isMe?"1.5px solid #f59e0b":"1px solid #1c2035"}">
      <div style="font-size:${i<3?19:12}px;width:26px;text-align:center;flex-shrink:0">${i===0?"&#127945;":i===1?"&#127946;":i===2?"&#127947;":`#${i+1}`}</div>
      <div style="flex:1"><div style="font-size:12px;font-weight:700;color:#eef0ff">${u.name}${u.isMe?`<span style="font-size:9px;color:#f5a623;background:#f59e0b18;padding:1px 5px;border-radius:4px;margin-left:4px">You</span>`:""}</div><div style="font-size:10px;color:#424960">${u.matches} matches played</div></div>
      <div style="font-size:16px;font-weight:900;color:${u.total?"#f5a623":"#1c2035"}">${u.total||"&mdash;"}</div>
    </div>`).join("")

  </div></div>`;
}

async function loadChallenges(){

  const uid=A.fbUser.uid;
  try{
    const q=query(collection(db,"challenges"),where("members","array-contains",uid));
    const snap=await getDocs(q);
    if(snap.docs.length>0){
      A.challenges=snap.docs.map(d=>({id:d.id,...d.data(),own:d.data().owner===uid}));

async function jnCh(){
  const inp=document.getElementById("chc");
  const code=(inp?inp.value:A.chCode||"").trim().toUpperCase();
  A.chCode=code;
  if(code.length<4){toast("Enter a valid challenge code (at least 4 letters)",false);return;}
  if(!A.fbUser){toast("Please sign in first",false);return;}
  try{
    const ref=doc(db,"challenges",code);
    const snap=await getDoc(ref);
    if(!snap.exists()){toast("Challenge not found — check the code and try again",false);return;}
    const data=snap.data();
    if(A.challenges.some(c=>c.id===code)){toast("You're already in this challenge!",false);return;}
    if(!data.members.includes(A.fbUser.uid)){
      await updateDoc(ref,{members:arrayUnion(A.fbUser.uid),memberNames:arrayUnion(A.profile?.name||"Player")});
    }
    A.challenges.push({id:code,...data,own:false});
    A.chCode="";A.chMode=null;
    toast("Joined "+data.name+"! Pick your squad now");
    /* Redirect to next upcoming match to pick squad */
    const nextMatch=SCH.find(mx=>mx.status==="next")||SCH.find(mx=>mx.status==="future");
    if(nextMatch){
      if(data.fmt==="r3"){openR3(nextMatch.id);}
      else{openXI(nextMatch.id);}
    }else{R();}
  }catch(e){toast("Failed to join: "+e.message,false);}
}

/* ══════════════════════════════════════════
   AUTO PICK — default XI based on form + credit value
   Rules: 11 players, <=100 credits, max 6 per team,
   min 1 WK, 1-4 BAT, 1-4 BOWL, 1-4 AR
   Prioritize: form:"hot" > captains > high credit (star) > others
══════════════════════════════════════════ */
function autoPick(){
  try{
  const m=A.match;if(!m){toast("No match selected",false);return;}
  const all=[...(SQ[m.t1]||[]).map(p=>({...p,team:m.t1})),...(SQ[m.t2]||[]).map(p=>({...p,team:m.t2}))];
  if(all.length<11){toast("Not enough players available",false);return;}  /* Score each player: hot form +5, captain +3, higher credit = higher score */
  const scored=all.map(p=>({...p,score:(p.form==="hot"?5:p.form==="warn"?-2:0)+(p.cap?3:0)+(CR[p.id]||7)*0.5}));
  scored.sort((a,b)=>b.score-a.score);
  /* Target composition: 2 WK, 3 BAT, 3 BOWL, 3 AR */
  const target={WK:2,BAT:3,BOWL:3,AR:3};
  const mins={WK:1,BAT:2,BOWL:2,AR:1};
  const maxs={WK:4,BAT:6,BOWL:6,AR:4};
  const picked=[];
  const rc={WK:0,BAT:0,AR:0,BOWL:0};
  const tc={};tc[m.t1]=0;tc[m.t2]=0;
  function canAdd(p){
    if(picked.some(s=>s.id===p.id))return false;
    if(tc[p.team]>=6)return false;
    if(rc[p.r]>=maxs[p.r])return false;
    const newCost=creditSum([...picked,p]);
    if(newCost>100)return false;
    /* Check remaining slots can fill minimum requirements */
    const remaining=10-picked.length;
    const needed=Object.entries(mins).reduce((s,[r,mn])=>s+Math.max(0,mn-(rc[r]+(p.r===r?1:0))),0);
    if(needed>remaining)return false;
    return true;
  }
  /* Phase 1: Fill minimum requirements with best available */
  for(const role of ["WK","BAT","BOWL","AR"]){
    const pool=scored.filter(p=>p.r===role);
    for(const p of pool){
      if(rc[role]>=mins[role])break;
      if(canAdd(p)){picked.push(p);rc[p.r]++;tc[p.team]++;}
    }
  }
  /* Phase 2: Fill to target composition */
  for(const role of ["BAT","AR","BOWL","WK"]){
    const pool=scored.filter(p=>p.r===role);
    for(const p of pool){
      if(picked.length>=11)break;
      if(rc[role]>=target[role])break;
      if(canAdd(p)){picked.push(p);rc[p.r]++;tc[p.team]++;}
    }
  }
  /* Phase 3: Fill remaining slots with highest scored available */
  for(const p of scored){
    if(picked.length>=11)break;
    if(canAdd(p)){picked.push(p);rc[p.r]++;tc[p.team]++;}
  }
  if(picked.length===11){
    A.sel=picked;
    A.C=A.VC=A.IP1=A.IP2=null;
    toast("Auto-picked XI! Review and tweak if needed.");
    R();
  }else{
    toast("Could not auto-pick a valid XI (got "+picked.length+") — try manually",false);
  }
  }catch(e){toast("Auto pick error: "+e.message,false);console.error("autoPick error:",e);}
}

   LOCAL ACTIONS

function _navCore(s){A.screen=s;A.match=null;A.mode=null;if(s==="groups"){A.grpBadge=0;loadChallenges();}R()}
function back(){A.screen="home";A.match=null;A.mode=null;R()}
function obN(){A.ob<2?A.ob++:obS();R()}
function obS(){A.screen="auth";R()}
function togP(id){
  const all=[...(SQ[A.match.t1]||[]).map(p=>({...p,team:A.match.t1})),...(SQ[A.match.t2]||[]).map(p=>({...p,team:A.match.t2}))];
  const p=all.find(x=>x.id===id);if(!p)return;
  const idx=A.sel.findIndex(s=>s.id===id);
  if(idx>=0){A.sel.splice(idx,1);if(A.C?.id===id)A.C=null;if(A.VC?.id===id)A.VC=null;if(A.IP1?.id===id)A.IP1=null;if(A.IP2?.id===id)A.IP2=null;}
  else{
    const cr=CR[id]||7,sp=creditSum(A.sel);
    /* BUG 3: Use safe float comparison */
    if(A.sel.length>=11||Math.round((cr+sp)*10)/10>100||A.sel.filter(s=>s.team===p.team).length>=6)return;
    /* BUG 2: Role validation — enforce: min 1 WK, max 8 BAT, max 6 BOWL, max 5 AR */
    const rc={WK:0,BAT:0,AR:0,BOWL:0};A.sel.forEach(s=>rc[s.r]++);
    const remaining=10-A.sel.length; /* slots left after this pick */
    if(p.r==="WK"&&rc.WK>=4){toast("Max 4 wicketkeepers",false);return;}
    if(p.r==="BAT"&&rc.BAT>=6){toast("Max 6 batters",false);return;}
    if(p.r==="BOWL"&&rc.BOWL>=6){toast("Max 6 bowlers",false);return;}
    if(p.r==="AR"&&rc.AR>=4){toast("Max 4 all-rounders",false);return;}
    /* Ensure at least 1 WK can still be picked */
    if(p.r!=="WK"&&rc.WK===0&&remaining<=1){toast("Must include at least 1 WK",false);return;}
    A.sel.push(p);
    const pb=document.getElementById("pb"+id);
    if(pb){pb.style.transform="scale(1.4)";setTimeout(()=>{pb.style.transform="scale(1)"},180);}
  }
  R();
}
function remP(id){A.sel=A.sel.filter(s=>s.id!==id);if(A.C?.id===id)A.C=null;if(A.VC?.id===id)A.VC=null;if(A.IP1?.id===id)A.IP1=null;if(A.IP2?.id===id)A.IP2=null;R()}
function gRoles(){
  if(A.sel.length!==11)return;
  /* BUG 2: Validate role composition before proceeding */
  const rc={WK:0,BAT:0,AR:0,BOWL:0};A.sel.forEach(p=>rc[p.r]++);
  if(rc.WK<1){toast("Need at least 1 wicketkeeper",false);return;}
  if(rc.BAT<1){toast("Need at least 1 batter",false);return;}
  if(rc.BOWL<1){toast("Need at least 1 bowler",false);return;}
  if(rc.AR<1){toast("Need at least 1 all-rounder",false);return;}
  A.step="roles";R();
}
function setC(id){const p=A.sel.find(s=>s.id===id);A.C=A.C?.id===id?null:p;if(A.VC?.id===id)A.VC=null;R()}
function setVC(id){const p=A.sel.find(s=>s.id===id);A.VC=A.VC?.id===id?null:p;if(A.C?.id===id)A.C=null;R()}
function setIP(id){
  const p=A.sel.find(s=>s.id===id);if(!p)return;
  /* If already assigned, toggle off */
  if(A.IP1?.id===id){A.IP1=null;R();return;}
  if(A.IP2?.id===id){A.IP2=null;R();return;}
  /* Assign to the correct team slot */
  const m=A.match;
  if(p.team===m.t1){
    A.IP1=p;
  } else {
    A.IP2=p;
  }
  /* Can't be C/VC and IP at the same time */
  if(A.C?.id===id)A.C=null;
  if(A.VC?.id===id)A.VC=null;
  R();
}
function lockXI(){if(A.C&&A.VC&&A.IP1&&A.IP2){A.step="done";try{navigator.vibrate&&navigator.vibrate([10,50,10])}catch(e){}R()}}
function ldXI(){if(!A.savedXI)return;const all=[...(SQ[A.match.t1]||[]).map(p=>({...p,team:A.match.t1})),...(SQ[A.match.t2]||[]).map(p=>({...p,team:A.match.t2}))];
  const validPlayers=A.savedXI.players.map(sp=>all.find(p=>p.id===sp.id)).filter(Boolean);
  const dropped=A.savedXI.players.length-validPlayers.length;
  A.sel=validPlayers;
  A.C=A.savedXI.C?all.find(p=>p.id===A.savedXI.C.id)||null:null;
  A.VC=A.savedXI.VC?all.find(p=>p.id===A.savedXI.VC.id)||null:null;
  A.IP1=A.savedXI.IP1?all.find(p=>p.id===A.savedXI.IP1.id)||null:null;
  A.IP2=A.savedXI.IP2?all.find(p=>p.id===A.savedXI.IP2.id)||null:null;
  if(A.C&&!A.sel.find(s=>s.id===A.C.id))A.C=null;
  if(A.VC&&!A.sel.find(s=>s.id===A.VC.id))A.VC=null;
  if(A.IP1&&!A.sel.find(s=>s.id===A.IP1.id))A.IP1=null;
  if(A.IP2&&!A.sel.find(s=>s.id===A.IP2.id))A.IP2=null;
  A.copXI=true;
  if(dropped>0)toast(dropped+" player"+(dropped>1?"s":"")+" not in this match — pick replacement"+(dropped>1?"s":""),false);
  R()}
function togR3(id){const all=[...(SQ[A.match.t1]||[]).map(p=>({...p,team:A.match.t1})),...(SQ[A.match.t2]||[]).map(p=>({...p,team:A.match.t2}))];const p=all.find(x=>x.id===id);if(!p)return;const idx=A.squad3.findIndex(s=>s&&s.id===id);if(idx>=0){A.squad3.splice(idx,1);}else{if(A.squad3.length>=3||A.squad3.filter(s=>s&&s.team===p.team).length>=2)return;A.squad3.push(p);}R()}
function remR3(i){A.squad3.splice(i,1);R()}
function lockR3(){if(A.squad3.length===3){A.done3=true;R()}}
function openShare(){A.shCode=A.codeItem;A.showSh=true;A.shDef=false;A.copied=false;R()}
function openShare3(){A.shCode=A.code3;A.showSh=true;A.shDef=false;A.copied=false;R()}
function doSh(){const txt=`Join my dotball IPL 2026 challenge!\nCode: ${A.shCode?.w||""}\nType this word on dotball to join my group.`;if(navigator.share){navigator.share({title:"dotball",text:txt}).catch(()=>{});}else{try{navigator.clipboard.writeText(txt);toast("Copied to clipboard!");}catch(e){prompt("Copy this:",txt);}}A.copied=true;R();setTimeout(()=>{A.copied=false;R()},2200)}
function cpCode(){try{navigator.clipboard.writeText(A.shCode?.w||"")}catch(e){}A.copied=true;R();setTimeout(()=>{A.copied=false;R()},2200)}
function uploadAv(inp){if(!inp.files||!inp.files[0])return;const fr=new FileReader();fr.onload=e=>{A.avatar=e.target.result;R();};fr.readAsDataURL(inp.files[0]);}
function editName(){const n=prompt("New display name:",A.profile?.name||"");if(n&&n.trim().length>=2){A.profile.name=n.trim();localStorage.setItem("db_name",n.trim());if(A.fbUser){updateProfile(A.fbUser,{displayName:n.trim()}).catch(()=>{});setDoc(doc(db,"users",A.fbUser.uid),{name:n.trim()},{merge:true}).catch(()=>{});}toast("Name updated!");R();}}
async function notifPerm(){const ok=await Notification.requestPermission();toast(ok==="granted"?"Notifications enabled!":"Permission denied",ok==="granted");}

/* ── Boot: Firebase auth drives everything ── */
function bootApp(){
  const ld=document.getElementById("loading");
  if(ld) ld.style.display="none";
  R();
}

// Firebase auth is the source of truth
let booted=false;
setTimeout(()=>{if(!booted){booted=true;bootApp();}}, 4000);

onAuthStateChanged(auth, user => {
  if(!booted){booted=true;}
  const ld=document.getElementById("loading");
  if(ld) ld.style.display="none";

  /* Don't interfere while signup/login is in progress */
  if(A.authBusy) return;

  if(user&&user.displayName){
    A.fbUser=user;
    A.profile={name:user.displayName,uid:user.uid};
    localStorage.setItem("db_name",user.displayName);
    localStorage.setItem("db_uid",user.uid);
    if(A.screen==="ob"||A.screen==="auth")A.screen="home";
    loadChallenges();
  } else if(user&&!user.displayName){
    /* Authenticated but no display name — likely mid-signup, ignore */
  } else {
    /* Not signed in */
    A.fbUser=null;A.profile=null;
  }
  R();
}, ()=>{ if(!booted){booted=true;bootApp();} });

// Make functions global
Object.assign(window,{A,R,obN,obS,doEmailSignup,doEmailLogin,doResetPw,doSignIn,doSignOut,playBtn,nav,back,openXI,openR3,togP,remP,gRoles,setC,setVC,setIP,lockXI,ldXI,togR3,remR3,lockR3,savXI,savR3,openShare,openShare3,doSh,cpCode,uploadAv,editName,notifPerm,mkCh,jnCh,autoPick});
